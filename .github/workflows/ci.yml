name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate requirement names
        run: python -m pip install -r requirements.txt --dry-run --no-deps --disable-pip-version-check

      - name: Audit dependencies
        run: |
          pip install pip-audit --quiet
          pip-audit -r requirements.txt --fail-on-cvss 7

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Syntax check
        shell: pwsh
        run: |
          @'
          import ast
          from pathlib import Path

          errors = []
          for path in Path(".").rglob("*.py"):
              if ".git" in path.parts or "__pycache__" in path.parts:
                  continue
              try:
                  ast.parse(path.read_text(encoding="utf-8", errors="replace"), filename=str(path))
              except SyntaxError as exc:
                  errors.append(f"{path}:{exc.lineno}:{exc.msg}")

          if errors:
              print("\n".join(errors))
              raise SystemExit(1)
          print("AST syntax check passed")
          '@ | python -
